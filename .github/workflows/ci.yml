name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/krpc/buildenv:3.8.0
      options: --user runner:runner
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: bazel
        run: buildifier -mode check -lint warn -r .

  build-krpc:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/krpc/buildenv:3.8.0
      options: --user runner:runner
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup
        uses: ./.github/actions/build-setup
      - name: fetch
        uses: krpc/krpc-core/.github/actions/bazel-fetch@action-bazel-fetch-v3
      - name: ksp-lib
        uses: krpc/krpc-core/.github/actions/ksp-lib@action-ksp-lib-v1
        with:
          game: ksp
          version: 1.12.5
      - name: build
        run: |
          bazel build \
            //:krpc \
            //:csproj \
            //tools/krpctools \
            //tools/TestServer:archive
      - name: upload-krpc-artifact
        uses: krpc/krpc-core/.github/actions/upload-artifact@action-upload-artifact-v2
        with:
          name: krpc
          path: bazel-bin/krpc-*.zip
      - name: upload-krpctools-artifact
        uses: krpc/krpc-core/.github/actions/upload-artifact@action-upload-artifact-v2
        with:
          name: krpctools
          path: bazel-bin/tools/krpctools/krpctools-*.tar.gz
      - name: upload-testserver-artifact
        uses: krpc/krpc-core/.github/actions/upload-artifact@action-upload-artifact-v2
        with:
          name: testserver
          path: bazel-bin/tools/TestServer/TestServer-*.zip

  build-genfiles:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/krpc/buildenv:3.8.0
      options: --user runner:runner
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup
        uses: ./.github/actions/build-setup
      - name: fetch
        uses: krpc/krpc-core/.github/actions/bazel-fetch@action-bazel-fetch-v3
      - name: ksp-lib
        uses: krpc/krpc-core/.github/actions/ksp-lib@action-ksp-lib-v1
        with:
          game: ksp
          version: 1.12.5
      - name: build
        run: tools/dist/genfiles.sh
      - name: upload-artifact
        uses: krpc/krpc-core/.github/actions/upload-artifact@action-upload-artifact-v2
        with:
          name: genfiles
          path: bazel-bin/krpc-genfiles-*.zip

  build-csharp-sln:
    needs: build-genfiles
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/krpc/buildenv:3.8.0
      options: --user runner:runner
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup
        uses: ./.github/actions/build-setup
      - name: fetch
        uses: krpc/krpc-core/.github/actions/bazel-fetch@action-bazel-fetch-v3
      - name: ksp-lib
        uses: krpc/krpc-core/.github/actions/ksp-lib@action-ksp-lib-v1
        with:
          game: ksp
          version: 1.12.5
      - name: download-genfiles
        uses: actions/download-artifact@v8
        with:
          name: genfiles
      - name: extract-genfiles
        run: |
          unzip krpc-genfiles-*.zip -d ./
          rm krpc-genfiles-*.zip
      - name: build
        run: |
          msbuild KRPC.sln /t:Clean,Build -p:Configuration=Debug /warnaserror
          msbuild KRPC.sln /t:Clean,Build -p:Configuration=Release /warnaserror

  build-client-cnano:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/krpc/buildenv:3.8.0
      options: --user runner:runner
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup
        uses: ./.github/actions/build-setup
      - name: fetch
        uses: krpc/krpc-core/.github/actions/bazel-fetch@action-bazel-fetch-v3
      - name: ksp-lib
        uses: krpc/krpc-core/.github/actions/ksp-lib@action-ksp-lib-v1
        with:
          game: ksp
          version: 1.12.5
      - name: ccache-restore
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: build-client-cnano-ccache-${{ runner.os }}-${{ hashFiles('client/cnano/CMakeLists.txt.tmpl') }}
          restore-keys: ccache-build-client-cnano-${{ runner.os }}-
      - name: build-system
        run: client/cnano/test-build.sh system
      - name: build-fetch
        run: client/cnano/test-build.sh fetch

  build-client-cpp:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/krpc/buildenv:3.8.0
      options: --user runner:runner
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup
        uses: ./.github/actions/build-setup
      - name: fetch
        uses: krpc/krpc-core/.github/actions/bazel-fetch@action-bazel-fetch-v3
      - name: ksp-lib
        uses: krpc/krpc-core/.github/actions/ksp-lib@action-ksp-lib-v1
        with:
          game: ksp
          version: 1.12.5
      - name: ccache-restore
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: build-client-cpp-ccache-${{ runner.os }}-${{ hashFiles('client/cpp/CMakeLists.txt.tmpl') }}
          restore-keys: build-client-cpp-ccache-${{ runner.os }}-
      - name: build-system
        run: client/cpp/test-build.sh system
      - name: build-fetch
        run: client/cpp/test-build.sh fetch

  build-docs-html:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/krpc/buildenv:3.8.0
      options: --user runner:runner
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    steps:
