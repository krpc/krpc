        with:
          game: ksp
          version: 1.12.5
      - name: build
        run: bazel build //client/csharp:csharp //client/csharp:nuget
      - name: test
        run: bazel test //client/csharp:test
      - name: upload-artifact
        uses: krpc/krpc-core/.github/actions/upload-artifact@action-upload-artifact-v2
        with:
          name: client-csharp-zip
          path: bazel-bin/client/csharp/krpc-csharp-*.zip
      - name: upload-artifact
        uses: krpc/krpc-core/.github/actions/upload-artifact@action-upload-artifact-v2
        with:
          name: client-csharp-nupkg
          path: bazel-bin/client/csharp/KRPC.Client.*.nupkg

  test-client-java:
