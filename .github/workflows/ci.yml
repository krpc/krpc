        uses: actions/checkout@v6
      - name: setup
        uses: ./.github/actions/build-setup
      - name: fetch
        uses: krpc/krpc-core/.github/actions/bazel-fetch@action-bazel-fetch-v3
      - name: ksp-lib
        uses: krpc/krpc-core/.github/actions/ksp-lib@action-ksp-lib-v1
        with:
          game: ksp
          version: 1.12.5
      - name: test
        run: |
          bazel test \
            //tools/krpctest:test \
            //tools/krpctools:test

  all-checks-passed:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - build-krpc
      - build-genfiles
      - build-csharp-sln
      - build-client-cnano
      - build-client-cpp
      - build-docs-html
      - build-docs-pdf
      - build-docs-examples
      - test-docs
      - test-core
      - test-client-cnano
      - test-client-cnano-windows
      - test-client-cpp
      - test-client-cpp-windows
      - test-client-csharp
      - test-client-java
      - test-client-python
      - test-client-lua
      - test-client-serialio
      - test-client-websockets
      - test-tools
    steps:
      - name: check
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
