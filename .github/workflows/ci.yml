      - name: upload-artifact
        uses: krpc/krpc-core/.github/actions/upload-artifact@action-upload-artifact-v2
        with:
          name: client-cpp
          path: bazel-bin/client/cpp/krpc-cpp-*.zip

  test-client-cpp-windows:
