  test-client-lua:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/krpc/buildenv:3.8.0
      options: --user runner:runner
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup
        uses: ./.github/actions/build-setup
      - name: fetch
        uses: krpc/krpc-core/.github/actions/bazel-fetch@action-bazel-fetch-v3
      - name: ksp-lib
        uses: krpc/krpc-core/.github/actions/ksp-lib@action-ksp-lib-v1
        with:
          game: ksp
          version: 1.12.5
      - name: build
        run: bazel build //client/lua:lua
      - name: test
        run: bazel test //client/lua:test
      - name: upload-artifact
        uses: krpc/krpc-core/.github/actions/upload-artifact@action-upload-artifact-v2
        with:
