      - name: upload-artifact
        uses: krpc/krpc-core/.github/actions/upload-artifact@action-upload-artifact-v2
        with:
          name: client-cnano
          path: bazel-bin/client/cnano/krpc-cnano-*.zip

  test-client-cnano-windows:
    needs: test-client-cnano
    runs-on: windows-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: download-artifact
        uses: actions/download-artifact@v8
        with:
          name: client-cnano

      - name: cache-vcpkg
        uses: actions/cache@v5
        with:
          path: C:\vcpkg-binary-cache
          key: test-client-cnano-windows-vcpkg-1

      - name: install-deps
        shell: pwsh
        env:
          VCPKG_DEFAULT_BINARY_CACHE: C:\vcpkg-binary-cache
        run: |
          New-Item -ItemType Directory -Force -Path C:\vcpkg-binary-cache | Out-Null
          vcpkg install nanopb:x64-windows

      - name: test-build
        shell: bash
        run: client/cnano/test-build-windows.sh

  test-client-cpp:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/krpc/buildenv:3.8.0
      options: --user runner:runner
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    steps:
