      - name: ksp-lib
        uses: krpc/krpc-core/.github/actions/ksp-lib@action-ksp-lib-v1
        with:
          game: ksp
          version: 1.12.5
      - name: build
        run: bazel build //doc:compile-scripts

  test-docs:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/krpc/buildenv:3.8.0
      options: --user runner:runner
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    steps:
      - name: checkout
