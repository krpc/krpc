inputs:
  long-version:
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - run: tools/github-actions/set-version.py
      if: ${{ inputs.long-version == 'true' }}
      shell: bash
    # Fetches all external repos, including the stripped KSP DLLs (@ksp), which the
    # Bazel build now compiles against -- no separate ksp-lib download step needed.
    - uses: ./.github/actions/bazel-fetch
