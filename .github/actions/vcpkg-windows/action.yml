inputs:
  packages:
    required: true
runs:
  using: composite
  steps:
    - name: cache-key
      id: cache-key
      shell: pwsh
      env:
        PACKAGES: ${{ inputs.packages }}
      run: |
        $commit = ((vcpkg version)[0] -split ' ')[-1]
        $parts = @('vcpkg', 'windows', $env:ImageOS, $env:ImageVersion, $commit, $env:PACKAGES)
        Write-Host 'cache key inputs:'
        $parts | ForEach-Object { Write-Host "  $_" }
        $info = $parts -join "`n"
        $hash = [BitConverter]::ToString(
          [Security.Cryptography.SHA256]::Create().ComputeHash(
            [Text.Encoding]::UTF8.GetBytes($info))).Replace('-', '').ToLower()
        Write-Host "cache key: vcpkg-$hash"
        echo "hash=$hash" >> $env:GITHUB_OUTPUT
    - name: cache-vcpkg
      uses: actions/cache@v5
      with:
        path: C:\vcpkg-binary-cache
        key: vcpkg-${{ steps.cache-key.outputs.hash }}
    - name: install-deps
      shell: pwsh
      env:
        VCPKG_DEFAULT_BINARY_CACHE: C:\vcpkg-binary-cache
      run: |
        New-Item -ItemType Directory -Force -Path C:\vcpkg-binary-cache | Out-Null
        vcpkg install ${{ inputs.packages }}
