runs:
  using: composite
  steps:
    - name: get-bazel-info
      shell: bash
      run: |
        echo "BAZEL_VERSION=$(bazel --version | cut -d' ' -f2)" >> "$GITHUB_ENV"
        # Cache only the download archives -- /var/cache/bazel-repo/content_addressable
        # (matches `common --repository_cache` in /etc/bazel.bazelrc). We deliberately
        # do NOT cache the whole /var/cache/bazel-repo: Bazel 9 also puts a "repo
        # contents cache" of *extracted* repositories under a sibling contents/ dir,
        # which must stay out of the GitHub cache. CI uses a system LLVM, so no ~2 GB
        # LLVM archive lands here -- the subdir is just the .NET SDK + misc. This
        # action only runs in the Linux buildenv container, so the path is fixed.
        echo "BAZEL_DOWNLOAD_CACHE=/var/cache/bazel-repo/content_addressable" >> "$GITHUB_ENV"
    - name: restore-bazel-cache
      id: bazel-cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ env.BAZEL_DOWNLOAD_CACHE }}
        key: bazel-repo-cache-${{ runner.os }}-${{ env.BAZEL_VERSION }}-${{ hashFiles('MODULE.bazel') }}
    - name: bazel-fetch
      if: steps.bazel-cache.outputs.cache-hit != 'true'
      shell: bash
      run: bazel fetch //...
    - name: save-bazel-cache
      if: steps.bazel-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: ${{ env.BAZEL_DOWNLOAD_CACHE }}
        key: bazel-repo-cache-${{ runner.os }}-${{ env.BAZEL_VERSION }}-${{ hashFiles('MODULE.bazel') }}
