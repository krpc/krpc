// Test-only part for exercising kRPC's DMagic science-experiment support.
//
// The standalone DMModuleScienceAnimateGeneric release ships only the part module, no parts, so
// there is nothing for the integration tests to drive. This ModuleManager patch clones the stock
// thermometer into a part whose science experiment is a DMModuleScienceAnimateGeneric (which
// subclasses ModuleScienceExperiment and stores its results in its own IScienceDataContainer),
// reproducing the DMagic data-container behaviour the SpaceCenter Experiment class must handle.
//
// :FOR[DMagicScienceAnimate] runs only when that mod (this GameData folder) is present, so the
// part exists exactly when the DMagic module is installed. experimentAnimation = false keeps it
// model/animation-independent; a start-tech, zero-cost part is available immediately in a career
// save. The part name has no underscores, so KSP keeps it verbatim (dmagicSensorTest), matching
// the availability probe in tools/krpctest/krpctest/game.py.

+PART[sensorThermometer]:FOR[DMagicScienceAnimate]
{
    @name = dmagicSensorTest
    @title = kRPC DMagic Test Sensor
    @TechRequired = start
    @entryCost = 0
    @cost = 0

    !MODULE[ModuleScienceExperiment] {}

    MODULE
    {
        name = DMModuleScienceAnimateGeneric
        experimentID = temperatureScan
        experimentActionName = Log Temperature
        resetActionName = Reset Thermometer
        reviewActionName = Review Data
        rerunnable = True
        experimentAnimation = false
        xmitDataScalar = 1.0
        experimentsLimit = 1
        useStaging = False
    }
}
