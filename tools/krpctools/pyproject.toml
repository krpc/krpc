[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "krpctools"
dynamic = ["version"]
authors = [
    {name = "djungelorm", email = "djungelorm@users.noreply.github.com"},
]
description = "Development tools and scripts for kRPC."
readme = "README.txt"
license = "GPL-3.0-only"
requires-python = ">=3.7"
dependencies = ["krpc >= 0.4", "jinja2"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: End Users/Desktop",
    "Natural Language :: English",
    "Programming Language :: Python :: 3",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: Unix",
    "Topic :: Communications",
    "Topic :: Games/Entertainment :: Simulation",
    "Topic :: Internet",
]

[project.urls]
Homepage = "https://krpc.github.io/krpc"

[project.scripts]
krpc-clientgen = "krpctools.clientgen:main"
krpc-docgen = "krpctools.docgen:main"
krpc-servicedefs = "krpctools.servicedefs:main"

[tool.hatch.version]
path = "krpctools/version.py"
pattern = '__version__ = "(?P<version>[^"]+)"'

[tool.hatch.build.targets.sdist]
include = [
    "krpctools/",
    "README.txt",
    "CHANGES.txt",
    "LICENSE",
    "COPYING",
    "VERSION.txt",
]

[tool.hatch.build.targets.wheel]
packages = ["krpctools"]
