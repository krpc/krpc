[pytest]
# The kRPC integration tests live under service/*/test and are run with pytest from the
# repository root (the krpctest package registers a pytest plugin that orders them by their
# required mods and adds a --ksp-dir option). importlib mode is required because several
# test files share a basename across services (e.g. test_control.py) and the directories
# are not packages.
testpaths = service/*/test
addopts = --import-mode=importlib

# Stream the framework's progress messages (game loading, mod set in use) live to the
# console. Only the krpctest logger emits at INFO in this codebase, so this stays quiet.
log_cli = true
log_cli_level = INFO
log_cli_format = %(name)s: %(message)s
